<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Eco-Bazar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            font-family: "Roboto", sans-serif;
        }
    </style>
</head>

<body>
    <!-- header-section -->
    <header class="container mx-auto px-12">
        <div class="py-2">
            <div class="flex justify-between ">
                <div class="flex items-center gap-2">
                    <img src="./image/Map Pin.png" alt="">
                    <p class="text-sm">Store Location: Lincoln- 344, Illinois, Chicago, USA</p>
                </div>
                <div class="flex justify-between text-sm">
                    <p class=" pr-5">English <i class="fa-solid fa-angle-down"></i></p>
                    <p class="border-l pl-5 border-gray-400">USD <i class="fa-solid fa-angle-down"></i></p>
                </div>
            </div>
        </div>
        <div>
            <div class="flex items-center justify-between border-b border-gray-300 py-2">
                <img class="w-40" src="/image/Logo.png" alt="">
                <div>
                    <ul class="flex gap-12">
                        <li><a class="hover:text-[#00B207] transition-all duration-300" href="">Home</a></li>
                        <li><a class="hover:text-[#00B207] transition-all duration-300" href="">Products</a></li>
                        <li><a class="hover:text-[#00B207] transition-all duration-300" href="">Blog</a></li>
                        <li><a class="hover:text-[#00B207] transition-all duration-300" href="">About</a></li>
                        <li><a class="hover:text-[#00B207] transition-all duration-300" href="">Contact</a></li>
                    </ul>
                </div>
                <div class="flex items-center gap-4 ">
                    <i class="fa-solid fa-user hover:text-[#00B207] transition-all duration-300"></i>
                    <i class="fa-solid fa-cart-arrow-down hover:text-[#00B207] transition-all duration-300"></i>
                    <i class="fa-solid fa-heart hover:text-[#00B207] transition-all duration-300"></i>
                </div>
            </div>
        </div>
    </header>
    <!-- hero-section -->
    <main>
        <section>
            <div class="flex justify-between container mx-auto px-12 pt-12 gap-5">
                <div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Fresh Fruits</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Vegetables</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>River Fish</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Chicken & Meat</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Drink & Water</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Yogurt &  Ice Cream</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Coke & Bread</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Butter & Cream</p>
                    </div>
                    <div class="flex gap-2 w-74 rounded-md shadow-md py-2 my-2 text-sm px-6 items-center text-gray-600">
                        <img src="/image/apple 1.png" alt="">
                        <p>Cooking</p>
                    </div>

                </div>
              
                    <div class="relative">
                        <img class="rounded-sm h-[70vh]" src="/image/Rectangle 52.png" alt="">
                        <div class="absolute top-30 left-5">
                            <h3 class="text-4xl text-white font-bold">Fresh & Healthy <br> Organic Food </h3>
                            <p class="text-[#668571] text-xl my-2 border-l-2 border-[#00B207] p-3">Sale Up to <br> <span class="text-white">48% </span> off</p>
                            <button class="bg-[#00B207] text-white px-8 py-2 rounded-4xl text-sm">Shop Now <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                    </div>
               
            </div>
        </section>
    </main>
</body>

</html>
